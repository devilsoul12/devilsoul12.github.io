<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: #1a1a2e;
        font-family: Arial, sans-serif;
        padding: 20px;
        color: white;
      }

      .card {
        background-color: #16213e;
        border-radius: 10px;
        padding: 20px;
        margin: 15px 0;
        border-left: 5px solid #e94560;
      }

      .card h2 {
        color: #e94560;
        margin: 0 0 10px 0;
      }

      .card p {
        color: #aaaaaa;
      }

      .button {
        background-color: #e94560;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        display: inline-block;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>

    <h1>My Learning Journey 🚀</h1>

    <div class="card">
      <h2>About Me</h2>
      <p>I am learning web development with HTML and CSS!</p>
    </div>

    <div class="card">
      <h2>My Skills</h2>
      <p>HTML, CSS, Vibe Coding 😎</p>
    </div>

    <div class="card">
      <h2>Visit GitHub</h2>
      <a class="button" href="https://github.com">Go to GitHub</a>
    </div>

  </body>
</html>
