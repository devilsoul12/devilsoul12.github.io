<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlowBook 💅</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0a0a0a; --surface:#111; --surface2:#181818; --surface3:#202020;
      --accent:#e8547a; --accent-soft:rgba(232,84,122,0.12);
      --gold:#f0c040; --gold-soft:rgba(240,192,64,0.12);
      --green:#4ecb71; --green-soft:rgba(78,203,113,0.12);
      --red:#ff4d6d; --red-soft:rgba(255,77,109,0.12);
      --text:#f5f0eb; --text2:#9a9490; --border:#1e1e1e; --border2:#2a2a2a;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
    header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg);position:sticky;top:0;z-index:100;}
    .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;}
    .logo em{color:var(--accent);font-style:italic;}
    .hright{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .dpill{font-size:11px;color:var(--text2);background:var(--surface);padding:5px 10px;border-radius:20px;border:1px solid var(--border2);}
    .ibtn{background:var(--surface);border:1px solid var(--border2);color:var(--text2);padding:6px 11px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .ibtn.gold{color:var(--gold);border-color:rgba(240,192,64,0.3);}
    .ibtn.grn{color:var(--green);border-color:rgba(78,203,113,0.3);}
    .tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{padding:13px 16px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none;transition:all 0.2s;}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .content{padding:18px;max-width:580px;margin:0 auto;}
    .page{display:none;} .page.active{display:block;}
    .srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
    .scard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 10px;text-align:center;}
    .sval{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--accent);margin-bottom:3px;line-height:1;}
    .slbl{font-size:10px;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;}
    .sec{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
    .sec::after{content:'';flex:1;height:1px;background:var(--border);}
    .fwrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px;}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .fg{display:flex;flex-direction:column;gap:5px;} .fg.full{grid-column:span 2;}
    .fg label{font-size:10px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;}
    .fg input,.fg select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border 0.2s;}
    .fg input:focus,.fg select:focus{border-color:var(--accent);}
    .fg input::placeholder{color:var(--text2);}
    select option{background:#181818;}
    .btnprimary{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
    .btnprimary:active{opacity:0.85;}
    .bcard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:10px;}
    .bcard.istoday{border-color:rgba(232,84,122,0.4);}
    .bcard.isdone{opacity:0.55;}
    .bctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .bcname{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}
    .spill{background:var(--accent-soft);color:var(--accent);font-size:11px;padding:3px 9px;border-radius:20px;}
    .bcmeta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text2);margin-bottom:10px;}
    .badges{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
    .badge{font-size:11px;padding:3px 9px;border-radius:20px;}
    .sdone{background:var(--green-soft);color:var(--green);}
    .spending{background:var(--gold-soft);color:var(--gold);}
    .pfull{background:var(--green-soft);color:var(--green);}
    .ppartial{background:var(--gold-soft);color:var(--gold);}
    .pnone{background:var(--red-soft);color:var(--red);}
    .paybar{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:10px;}
    .pbtop{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:var(--text2);}
    .pbg{height:4px;background:var(--surface3);border-radius:10px;overflow:hidden;}
    .pbf{height:100%;border-radius:10px;background:var(--accent);}
    .phist{margin-bottom:8px;}
    .pentry{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text2);}
    .pentry:last-child{border:none;}
    .pentry b{color:var(--green);}
    .apform{background:var(--surface2);border-radius:8px;padding:11px;margin-bottom:8px;display:none;}
    .apform.open{display:block;}
    .aprow{display:flex;gap:7px;}
    .aprow input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
    .aprow input:focus{border-color:var(--green);}
    .aprow button{background:var(--green);color:#0a0a0a;border:none;border-radius:7px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .arow{display:flex;gap:6px;flex-wrap:wrap;}
    .abtn{flex:1;min-width:70px;padding:9px 6px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;}
    .abtn.ag{border-color:rgba(78,203,113,0.3);color:var(--green);}
    .abtn.ay{border-color:rgba(240,192,64,0.3);color:var(--gold);}
    .abtn.ar{border-color:rgba(255,77,109,0.3);color:var(--red);}
    .todaytag{font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
    .pitem{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .piname{font-weight:500;margin-bottom:3px;}
    .pisub{font-size:12px;color:var(--text2);}
    .piamt{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}
    .pis2{font-size:11px;color:var(--text2);margin-top:2px;text-align:right;}
    .cwrap{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:14px;}
    .cttl{font-size:13px;font-weight:500;margin-bottom:12px;}
    .empty{text-align:center;color:var(--text2);padding:28px 0;font-size:13px;}
  </style>
</head>
<body>

<header>
  <div class="logo">Glow<em>Book</em> 💅</div>
  <div class="hright">
    <div class="dpill" id="datePill"></div>
    <button class="ibtn gold" id="exportBtn">⬇ Backup</button>
    <label class="ibtn grn">⬆ Restore<input type="file" id="importFile" accept=".json" style="display:none"></label>
  </div>
</header>

<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="dashboard">🏠 Dashboard</div>
  <div class="tab" data-tab="bookings">📅 Bookings</div>
  <div class="tab" data-tab="payments">💰 Payments</div>
  <div class="tab" data-tab="analytics">📊 Analytics</div>
</div>

<div class="content">

  <div class="page active" id="page-dashboard">
    <div class="srow">
      <div class="scard"><div class="sval" id="s-today">0</div><div class="slbl">Today</div></div>
      <div class="scard"><div class="sval" id="s-month">₹0</div><div class="slbl">Earned</div></div>
      <div class="scard"><div class="sval" id="s-pend">₹0</div><div class="slbl">Pending</div></div>
    </div>
    <div class="sec">Today's Appointments</div>
    <div id="d-today"></div>
    <div class="sec">Upcoming</div>
    <div id="d-upcoming"></div>
  </div>

  <div class="page" id="page-bookings">
    <div class="fwrap">
      <div class="sec" style="margin-top:0">New Booking</div>
      <div class="fgrid">
        <div class="fg full"><label>Client Name</label><input id="f-name" placeholder="e.g. Priya Sharma" type="text"/></div>
        <div class="fg"><label>Service</label>
          <select id="f-service">
            <option>Haircut</option><option>Facial</option><option>Waxing</option>
            <option>Threading</option><option>Bridal Makeup</option><option>Party Makeup</option>
            <option>Hair Color</option><option>Manicure</option><option>Pedicure</option><option>Other</option>
          </select>
        </div>
        <div class="fg"><label>Date</label><input id="f-date" type="date"/></div>
        <div class="fg"><label>Time</label><input id="f-time" type="time"/></div>
        <div class="fg"><label>Total Price (₹)</label><input id="f-total" type="number" placeholder="500"/></div>
        <div class="fg"><label>Advance Paid (₹)</label><input id="f-advance" type="number" placeholder="200"/></div>
        <div class="fg full"><label>Notes</label><input id="f-notes" type="text" placeholder="Special requests..."/></div>
      </div>
      <button class="btnprimary" id="addBtn">+ Add Booking</button>
    </div>
    <div class="sec">All Bookings</div>
    <div id="all-bookings"></div>
  </div>

  <div class="page" id="page-payments">
    <div class="srow">
      <div class="scard"><div class="sval" id="p-col">₹0</div><div class="slbl">Collected</div></div>
      <div class="scard"><div class="sval" id="p-pend">₹0</div><div class="slbl">Pending</div></div>
      <div class="scard"><div class="sval" id="p-tot">₹0</div><div class="slbl">Total</div></div>
    </div>
    <div class="sec">Payment Pending</div>
    <div id="pay-pend"></div>
    <div class="sec">Fully Paid</div>
    <div id="pay-done"></div>
  </div>

  <div class="page" id="page-analytics">
    <div class="srow">
      <div class="scard"><div class="sval" id="a-cl">0</div><div class="slbl">Clients</div></div>
      <div class="scard"><div class="sval" id="a-earn">₹0</div><div class="slbl">Earned</div></div>
      <div class="scard"><div class="sval" id="a-mo">0</div><div class="slbl">This Month</div></div>
    </div>
    <div class="cwrap"><div class="cttl">Monthly Bookings 📅</div><canvas id="bchart"></canvas></div>
    <div class="cwrap"><div class="cttl">Monthly Earnings 💰</div><canvas id="echart"></canvas></div>
  </div>

</div>

<script>
var bookings = JSON.parse(localStorage.getItem('glowbook_v2') || '[]');
var bc, ec;
var TODAY = new Date().toISOString().split('T')[0];

document.getElementById('datePill').innerText = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
document.getElementById('f-date').value = TODAY;

function save(){ localStorage.setItem('glowbook_v2', JSON.stringify(bookings)); }
function paid(b){ return b.payments.reduce(function(s,p){return s+p.amount;},0); }
function rem(b){ return Math.max(0, b.total - paid(b)); }

// Tab switching
document.getElementById('tabBar').addEventListener('click', function(e){
  var t = e.target.closest('.tab');
  if(!t) return;
  var name = t.getAttribute('data-tab');
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active');
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  if(name==='analytics') renderCharts();
});

// Add booking
document.getElementById('addBtn').addEventListener('click', function(){
  var name = document.getElementById('f-name').value.trim();
  var date = document.getElementById('f-date').value;
  if(!name||!date){alert('Please enter client name and date!');return;}
  var total = parseFloat(document.getElementById('f-total').value)||0;
  var advance = parseFloat(document.getElementById('f-advance').value)||0;
  bookings.push({
    id: Date.now(),
    name: name,
    service: document.getElementById('f-service').value,
    date: date,
    time: document.getElementById('f-time').value,
    total: total,
    notes: document.getElementById('f-notes').value.trim(),
    serviceDone: false,
    payments: advance>0?[{amount:advance,note:'Advance',date:date}]:[]
  });
  save(); renderAll();
  document.getElementById('f-name').value='';
  document.getElementById('f-total').value='';
  document.getElementById('f-advance').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-date').value=TODAY;
});

// Event delegation for all card actions
document.addEventListener('click', function(e){
  // Service done
  var sd = e.target.closest('[data-action="service-done"]');
  if(sd){ markDone(parseInt(sd.getAttribute('data-id'))); return; }
  // Toggle pay form
  var tp = e.target.closest('[data-action="toggle-pay"]');
  if(tp){ togglePay(parseInt(tp.getAttribute('data-id'))); return; }
  // Add payment confirm
  var ap = e.target.closest('[data-action="add-pay"]');
  if(ap){ doAddPay(parseInt(ap.getAttribute('data-id'))); return; }
  // Delete
  var del = e.target.closest('[data-action="delete"]');
  if(del){ doDelete(parseInt(del.getAttribute('data-id'))); return; }
});

// Export
document.getElementById('exportBtn').addEventListener('click', function(){
  var blob = new Blob([JSON.stringify(bookings,null,2)],{type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='glowbook-backup-'+TODAY+'.json'; a.click();
  URL.revokeObjectURL(url);
});

// Import
document.getElementById('importFile').addEventListener('change', function(e){
  var file = e.target.files[0]; if(!file) return;
  var r = new FileReader();
  r.onload = function(ev){
    try{
      var d = JSON.parse(ev.target.result);
      if(Array.isArray(d)){bookings=d;save();renderAll();alert('Data restored! 🎉');}
      else alert('Invalid file!');
    }catch(err){alert('Could not read file!');}
  };
  r.readAsText(file);
});

function markDone(id){
  bookings = bookings.map(function(b){return b.id===id?Object.assign({},b,{serviceDone:true}):b;});
  save(); renderAll();
}

function togglePay(id){
  var f = document.getElementById('apf-'+id);
  if(f) f.classList.toggle('open');
}

function doAddPay(id){
  var inp = document.getElementById('ap-'+id);
  var amt = parseFloat(inp?inp.value:0);
  if(!amt||amt<=0){alert('Enter a valid amount!');return;}
  bookings = bookings.map(function(b){
    if(b.id!==id) return b;
    var u = Object.assign({},b);
    u.payments = b.payments.concat([{amount:amt,note:'Payment',date:TODAY}]);
    return u;
  });
  save(); renderAll();
}

function doDelete(id){
  if(confirm('Delete this booking?')){
    bookings = bookings.filter(function(b){return b.id!==id;});
    save(); renderAll();
  }
}

function makeCard(b){
  var isToday = b.date===TODAY;
  var p = paid(b);
  var r = rem(b);
  var pct = b.total>0?Math.min(100,Math.round(p/b.total*100)):0;

  var svcBadge = b.serviceDone
    ? '<span class="badge sdone">✓ Service Done</span>'
    : '<span class="badge spending">⏳ Service Pending</span>';

  var payBadge = r<=0
    ? '<span class="badge pfull">✓ Fully Paid</span>'
    : (p>0 ? '<span class="badge ppartial">₹'+r+' Remaining</span>' : '<span class="badge pnone">₹'+b.total+' Unpaid</span>');

  var hist = b.payments.length>0
    ? '<div class="phist">'+b.payments.map(function(x){return '<div class="pentry"><span>'+x.note+' · '+x.date+'</span><b>+₹'+x.amount+'</b></div>';}).join('')+'</div>'
    : '';

  var addPayForm = r>0
    ? '<div class="apform" id="apf-'+b.id+'"><div class="aprow"><input type="number" id="ap-'+b.id+'" placeholder="Amount received..."><button data-action="add-pay" data-id="'+b.id+'">+ Add</button></div></div>'
    : '';

  var btns = '';
  if(!b.serviceDone) btns += '<button class="abtn ag" data-action="service-done" data-id="'+b.id+'">✓ Service Done</button>';
  if(r>0) btns += '<button class="abtn ay" data-action="toggle-pay" data-id="'+b.id+'">💰 Add Payment</button>';
  btns += '<button class="abtn ar" data-action="delete" data-id="'+b.id+'">✕ Delete</button>';

  return '<div class="bcard'+(isToday?' istoday':'')+(b.serviceDone&&r<=0?' isdone':'')+'">'
    +(isToday?'<div class="todaytag">⚡ Today</div>':'')
    +'<div class="bctop"><div class="bcname">'+b.name+'</div><div class="spill">'+b.service+'</div></div>'
    +'<div class="bcmeta"><span>📅 '+b.date+'</span>'+(b.time?'<span>🕐 '+b.time+'</span>':'')+(b.notes?'<span>📝 '+b.notes+'</span>':'')+'</div>'
    +'<div class="badges">'+svcBadge+payBadge+'</div>'
    +'<div class="paybar"><div class="pbtop"><span>Total: ₹'+b.total+'</span><span>Collected: ₹'+p+' ('+pct+'%)</span></div><div class="pbg"><div class="pbf" style="width:'+pct+'%"></div></div></div>'
    +hist
    +addPayForm
    +'<div class="arow">'+btns+'</div>'
    +'</div>';
}

function renderAll(){
  var mk = TODAY.slice(0,7);
  var todayList = bookings.filter(function(b){return b.date===TODAY&&!b.serviceDone;});
  var upcoming = bookings.filter(function(b){return b.date>TODAY&&!b.serviceDone;}).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,5);
  var allSorted = bookings.slice().sort(function(a,b){return b.date.localeCompare(a.date);});

  document.getElementById('s-today').innerText = todayList.length;
  var mEarned = bookings.filter(function(b){return b.date.startsWith(mk);}).reduce(function(s,b){return s+paid(b);},0);
  document.getElementById('s-month').innerText = '₹'+mEarned;
  var tPend = bookings.reduce(function(s,b){return s+rem(b);},0);
  document.getElementById('s-pend').innerText = '₹'+tPend;

  document.getElementById('d-today').innerHTML = todayList.length?todayList.map(makeCard).join(''):'<div class="empty">No appointments today 🌸</div>';
  document.getElementById('d-upcoming').innerHTML = upcoming.length?upcoming.map(makeCard).join(''):'<div class="empty">No upcoming bookings 📅</div>';
  document.getElementById('all-bookings').innerHTML = allSorted.length?allSorted.map(makeCard).join(''):'<div class="empty">No bookings yet! Add your first one ✨</div>';

  var col = bookings.reduce(function(s,b){return s+paid(b);},0);
  var pend = bookings.reduce(function(s,b){return s+rem(b);},0);
  var tot = bookings.reduce(function(s,b){return s+b.total;},0);
  document.getElementById('p-col').innerText='₹'+col;
  document.getElementById('p-pend').innerText='₹'+pend;
  document.getElementById('p-tot').innerText='₹'+tot;

  var pendList = bookings.filter(function(b){return rem(b)>0;});
  var paidList = bookings.filter(function(b){return rem(b)<=0;});

  document.getElementById('pay-pend').innerHTML = pendList.length
    ?pendList.map(function(b){return '<div class="pitem"><div><div class="piname">'+b.name+'</div><div class="pisub">'+b.service+' · '+b.date+'</div></div><div><div class="piamt" style="color:var(--gold)">₹'+rem(b)+'</div><div class="pis2">of ₹'+b.total+'</div></div></div>';}).join('')
    :'<div class="empty">No pending payments 🎉</div>';

  document.getElementById('pay-done').innerHTML = paidList.length
    ?paidList.map(function(b){retur
