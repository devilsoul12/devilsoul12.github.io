<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do — Villen</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      color: #555;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .back-link:hover { color: #c8f135; }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #f0ede6;
      margin: 48px 0 32px;
      letter-spacing: -0.02em;
    }

    .title span { color: #c8f135; }

    .input-area {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
    }

    .input-area input {
      flex: 1;
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px 18px;
      color: #f0ede6;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border 0.2s;
    }

    .input-area input:focus {
      border-color: #c8f135;
    }

    .input-area input::placeholder { color: #444; }

    .add-btn {
      background: #c8f135;
      color: #0d0d0d;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 22px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 700;
    }

    .add-btn:hover { background: #d4f050; }
    .add-btn:active { transform: scale(0.94); }

    .stats {
      font-size: 13px;
      color: #444;
      margin-bottom: 20px;
      width: 100%;
      max-width: 480px;
    }

    .stats span { color: #c8f135; }

    .todo-list {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s;
      animation: slideIn 0.3s ease;
    }

    .todo-item:hover { border-color: #333; }

    .todo-item.done {
      opacity: 0.4;
      border-color: #1a1a1a;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #444;
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #333;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #0d0d0d;
    }

    .todo-item.done .check-btn {
      background: #c8f135;
      border-color: #c8f135;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #f0ede6;
      font-weight: 300;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
      padding: 4px;
    }

    .delete-btn:hover { color: #ff4d4d; }

    .empty-state {
      color: #333;
      font-size: 14px;
      margin-top: 40px;
      text-align: center;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a class="back-link" href="/">← Back to Portfolio</a>

  <div class="title">To-Do<span>.</span></div>

  <div class="input-area">
    <input type="text" id="todoInput" placeholder="Add a new task..." onkeypress="handleEnter(event)">
    <button class="add-btn" onclick="addTodo()">+</button>
  </div>

  <div class="stats" id="stats">No tasks yet</div>

  <div class="todo-list" id="todoList">
    <div class="empty-state">✨ Add your first task above!</div>
  </div>

  <script>
    let todos = [];

    function handleEnter(e) {
      if (e.key === 'Enter') addTodo();
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;

      todos.push({ id: Date.now(), text: text, done: false });
      input.value = '';
      render();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const stats = document.getElementById('stats');

      const total = todos.length;
      const done = todos.filter(t => t.done).length;

      if (total === 0) {
        list.innerHTML = '<div class="empty-state">✨ Add your first task above!</div>';
        stats.innerHTML = 'No tasks yet';
        return;
      }

      stats.innerHTML = '<span>' + done + '</span> of <span>' + total + '</span> tasks completed';

      list.innerHTML = todos.map(todo => `
        <div class="todo-item ${todo.done ? 'done' : ''}">
          <button class="check-btn" onclick="toggleTodo(${todo.id})">
            ${todo.done ? '✓' : ''}
          </button>
          <span class="todo-text">${todo.text}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">✕</button>
        </div>
      `).join('');
    }
  </script>

</body>
</html>
