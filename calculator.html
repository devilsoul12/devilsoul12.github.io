<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator — Villen</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      color: #555;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .back-link:hover { color: #c8f135; }

    .calc-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #f0ede6;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .calc-title span { color: #c8f135; }

    .calculator {
      background: #141414;
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
      border: 1px solid #222;
    }

    .display {
      background: #0d0d0d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
      border: 1px solid #222;
    }

    .display-expression {
      font-size: 13px;
      color: #444;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .display-number {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: #f0ede6;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px 10px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 400;
    }

    button:active { transform: scale(0.94); }

    .btn-number {
      background: #1e1e1e;
      color: #f0ede6;
    }

    .btn-number:hover { background: #2a2a2a; }

    .btn-operator {
      background: #222;
      color: #c8f135;
      font-size: 20px;
    }

    .btn-operator:hover { background: #2a2a2a; }

    .btn-equals {
      background: #c8f135;
      color: #0d0d0d;
      font-size: 22px;
      font-weight: 700;
    }

    .btn-equals:hover { background: #d4f050; }

    .btn-clear {
      background: #1e1e1e;
      color: #ff4d4d;
    }

    .btn-clear:hover { background: #2a2a2a; }

    .btn-wide {
      grid-column: span 2;
    }
  </style>
</head>
<body>

  <a class="back-link" href="/">← Back to Portfolio</a>

  <div class="calc-title">Calc<span>.</span></div>

  <div class="calculator">
    <div class="display">
      <div class="display-expression" id="expression"></div>
      <div class="display-number" id="display">0</div>
    </div>

    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-operator" onclick="toggleSign()">+/-</button>
      <button class="btn-operator" onclick="percentage()">%</button>
      <button class="btn-operator" onclick="setOperator('/')">÷</button>

      <button class="btn-number" onclick="pressNum('7')">7</button>
      <button class="btn-number" onclick="pressNum('8')">8</button>
      <button class="btn-number" onclick="pressNum('9')">9</button>
      <button class="btn-operator" onclick="setOperator('*')">×</button>

      <button class="btn-number" onclick="pressNum('4')">4</button>
      <button class="btn-number" onclick="pressNum('5')">5</button>
      <button class="btn-number" onclick="pressNum('6')">6</button>
      <button class="btn-operator" onclick="setOperator('-')">−</button>

      <button class="btn-number" onclick="pressNum('1')">1</button>
      <button class="btn-number" onclick="pressNum('2')">2</button>
      <button class="btn-number" onclick="pressNum('3')">3</button>
      <button class="btn-operator" onclick="setOperator('+')">+</button>

      <button class="btn-number btn-wide" onclick="pressNum('0')">0</button>
      <button class="btn-number" onclick="pressDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let currentNum = '0';
    let previousNum = '';
    let operator = null;
    let shouldReset = false;

    function updateDisplay(value) {
      document.getElementById('display').innerText = value;
    }

    function updateExpression(value) {
      document.getElementById('expression').innerText = value;
    }

    function pressNum(num) {
      if (currentNum === '0' || shouldReset) {
        currentNum = num;
        shouldReset = false;
      } else {
        if (currentNum.length < 10) {
          currentNum += num;
        }
      }
      updateDisplay(currentNum);
    }

    function pressDecimal() {
      if (shouldReset) { currentNum = '0'; shouldReset = false; }
      if (!currentNum.includes('.')) {
        currentNum += '.';
        updateDisplay(currentNum);
      }
    }

    function setOperator(op) {
      previousNum = currentNum;
      operator = op;
      shouldReset = true;
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      updateExpression(previousNum + ' ' + symbols[op]);
    }

    function calculate() {
      if (!operator || !previousNum) return;
      const a = parseFloat(previousNum);
      const b = parseFloat(currentNum);
      let result;
      if (operator === '+') result = a + b;
      else if (operator === '-') result = a - b;
      else if (operator === '*') result = a * b;
      else if (operator === '/') result = b !== 0 ? a / b : 'Error';
      updateExpression(previousNum + ' ' + operator + ' ' + currentNum + ' =');
      currentNum = String(parseFloat(result.toFixed(8)));
      updateDisplay(currentNum);
      operator = null;
      shouldReset = true;
    }

    function clearAll() {
      currentNum = '0';
      previousNum = '';
      operator = null;
      shouldReset = false;
      updateDisplay('0');
      updateExpression('');
    }

    function toggleSign() {
      currentNum = String(parseFloat(currentNum) * -1);
      updateDisplay(currentNum);
    }

    function percentage() {
      currentNum = String(parseFloat(currentNum) / 100);
      updateDisplay(currentNum);
    }
  </script>

</body>
  </html>
