<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather — Villen</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      color: #555;
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .back-link:hover { color: #c8f135; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: #c8f135;
      margin-bottom: 8px;
    }

    h1 span { color: white; }

    .subtitle {
      color: #555;
      margin-bottom: 40px;
      font-size: 15px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 32px;
    }

    .search-bar input {
      flex: 1;
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px 18px;
      color: white;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border 0.2s;
    }

    .search-bar input:focus { border-color: #c8f135; }
    .search-bar input::placeholder { color: #444; }

    .search-bar button {
      background: #c8f135;
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .search-bar button:active { transform: scale(0.94); }

    .status {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .status.error { color: #ff4d4d; }
    .status.loading { color: #555; }

    .weather-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      display: none;
      animation: fadeUp 0.4s ease;
    }

    .weather-card.show { display: block; }

    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .weather-emoji { font-size: 72px; margin: 16px 0; }

    .temperature {
      font-family: 'Syne', sans-serif;
      font-size: 64px;
      font-weight: 800;
      color: #c8f135;
      margin-bottom: 24px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
    }

    .stat-label {
      color: #555;
      font-size: 11px;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .stat-value { color: white; font-size: 15px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a class="back-link" href="/">← Back to Portfolio</a>

  <h1>Weather<span>.</span></h1>
  <p class="subtitle">Search any city in the world</p>

  <div class="search-bar">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="getWeather()">🔍</button>
  </div>

  <div class="status" id="status"></div>

  <div class="weather-card" id="weatherCard">
    <div class="city-name" id="cityName"></div>
    <div class="weather-emoji" id="weatherEmoji"></div>
    <div class="temperature" id="temperature"></div>
    <div class="stats">
      <div>
        <div class="stat-label">HUMIDITY</div>
        <div class="stat-value" id="humidity"></div>
      </div>
      <div>
        <div class="stat-label">WIND</div>
        <div class="stat-value" id="wind"></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('cityInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') getWeather();
    });

    function getEmoji(code) {
      if (code === 0) return '☀️';
      if (code <= 3) return '⛅';
      if (code <= 67) return '🌧️';
      if (code <= 77) return '❄️';
      if (code <= 99) return '⛈️';
      return '🌤️';
    }

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return;

      const status = document.getElementById('status');
      const card = document.getElementById('weatherCard');

      status.className = 'status loading';
      status.innerText = 'Fetching weather... ⏳';
      card.classList.remove('show');

      try {
        const geoRes = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
        );
        const geoData = await geoRes.json();

        if (!geoData.results) {
          status.className = 'status error';
          status.innerText = 'City not found! Try again 🌍';
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];

        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code`
        );
        const weatherData = await weatherRes.json();
        const w = weatherData.current;

        document.getElementById('cityName').innerText = `${name}, ${country}`;
        document.getElementById('weatherEmoji').innerText = getEmoji(w.weather_code);
        document.getElementById('temperature').innerText = `${Math.round(w.temperature_2m)}°C`;
        document.getElementById('humidity').innerText = `${w.relative_humidity_2m}%`;
        document.getElementById('wind').innerText = `${w.wind_speed_10m} km/h`;

        status.innerText = '';
        card.classList.add('show');

      } catch (e) {
        status.className = 'status error';
        status.innerText = 'Something went wrong!';
      }
    }
  </script>

</body>
  </html>
